<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Online Media Mock</title>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="online">ONLINE</span>
      <span class="media">MEDIA</span>
    </div>

    <nav class="nav">
      <ul>
        <li><a href="#">HOME</a></li>
        <li><a href="#">STRATEGY</a></li>
        <li><a href="#">SOLUSI</a></li>
        <li><a href="#">MARKETING</a></li>
        <li><a href="#">WORKSHOP</a></li>
        <li><a href="#">OUR WORK</a></li>
        <li><a href="#">PRODUK</a></li>
        <li><a href="#">PARTNER</a></li>
        <li><a href="#">INSPIRASI</a></li>
        <li><a href="#">FAQ</a></li>
      </ul>
    </nav>

    <div class="tiles-wrap d-flex justify-content-center">
      <section class="service-grid d-grid">
        <div class="service-card analytic-tile">
          <div class="service-icon text-center">
            <i class="bi bi-pie-chart"></i>
          </div>
          <div class="service-label">Analytic</div>
        </div>

        <div class="service-card creative-tile">
          <div class="service-icon text-center">
            <i class="bi bi-thermometer"></i>
          </div>
          <div class="service-label">Creative</div>
        </div>

        <div class="service-card development-tile">
          <div class="service-icon text-center">
            <i class="bi bi-display"></i>
          </div>
          <div class="service-label">Development</div>
        </div>

        <div class="service-card marketing-tile">
          <div class="service-icon text-center gears-wrap">
            <i class="bi bi-gear-fill big-gear"></i>
            <i class="bi bi-gear-fill small-gear"></i>
          </div>
          <div class="service-label">Marketing</div>
        </div>

        <div class="service-card media-tile">
          <div class="service-icon text-center">
            <i class="bi bi-play-circle"></i>
          </div>
          <div class="service-label">Media</div>
        </div>

        <div class="service-card optimization-tile">
          <div class="service-icon text-center">
            <i class="bi bi-rocket-takeoff"></i>
          </div>
          <div class="service-label">Optimitation</div>
        </div>
      </section>
    </div>
  </div>
